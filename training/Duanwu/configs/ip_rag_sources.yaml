        text: 巴巴爸爸像花一样在花园里出生，可以把自己的身体变成各种形状，性格友善，大家都喜欢他。巴巴妈妈是巴巴爸爸一家中的妈妈。巴巴爸爸一家包含巴巴爸爸、巴巴妈妈以及巴巴祖、巴巴拉拉、巴巴布莱特、巴巴贝尔等孩子。注意：巴巴爸爸一家的能力是身体变形，不是魔法，也不是凭空制造物品；可以变成桥、梯子、浇水壶形状或篮子形状来帮忙，但不要写成“变出花、变出丝带、用魔法棒变出东西”。故事应突出变形帮助朋友、家庭合作和温柔解决问题。

