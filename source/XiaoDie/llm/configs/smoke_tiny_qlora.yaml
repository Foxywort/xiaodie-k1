run_name: xiaodie-story-smoke-tiny-qlora

model:
  name_or_path: hf-internal-testing/tiny-random-LlamaForCausalLM
  cache_dir: E:/xiaodie_models/huggingface
  trust_remote_code: false
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: float16
  bnb_4bit_use_double_quant: true

data:
  train_file: llm/data/processed/story_sft_train.jsonl
  eval_file: llm/data/processed/story_sft_eval.jsonl
  max_seq_length: 256

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: llm/outputs/smoke-tiny-qlora
  num_train_epochs: 1
  max_steps: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  warmup_ratio: 0.0
  lr_scheduler_type: constant
  logging_steps: 1
  save_steps: 1
  eval_steps: 1
  save_total_limit: 1
  fp16: true
  bf16: false
  gradient_checkpointing: false
  optim: adamw_torch
  report_to: none
  seed: 20260616
